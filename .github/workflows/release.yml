name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version without the leading v, for example 0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-installer-and-release:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Resolve and validate version
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            $version = $env:INPUT_VERSION
          } else {
            $version = $env:TAG_NAME -replace '^v', ''
          }
          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid release version: $version"
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate release configuration
        shell: pwsh
        run: ./tests/release_config_tests.ps1

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Test
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Compress-Archive `
            -LiteralPath @('build\Release\MultiPaste.exe', 'README.md') `
            -DestinationPath "artifacts\MultiPaste-$env:VERSION-win-x64.zip" `
            -CompressionLevel Optimal

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path -LiteralPath $iscc)) {
            throw "Inno Setup compiler not found: $iscc"
          }
          & $iscc "/DMyAppVersion=$env:VERSION" "installer\MultiPaste.iss"

      - name: Create checksums
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath artifacts -File |
            Sort-Object Name |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object {
              "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))"
            } | Set-Content -LiteralPath artifacts\SHA256SUMS.txt -Encoding ascii

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -LiteralPath artifacts -File |
            Select-Object -ExpandProperty FullName
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $assets --clobber
          } else {
            gh release create $env:RELEASE_TAG $assets `
              --target $env:GITHUB_SHA `
              --title "MultiPaste $env:VERSION" `
              --generate-notes
          }
